services:
  # Backend Web Service
  - type: web
    name: e-portfolio-backend
    env: node
    rootDir: backend
    plan: free
    buildCommand: npm install
    startCommand: npm start
    envVars:
      - key: NODE_VERSION
        value: 18.0.0
      - key: MONGODB_URI
        sync: false # User will need to provide this in Render dashboard
      - key: JWT_SECRET
        generateValue: true # Generates a random secret if not provided
      - key: CLOUDINARY_URL
        sync: false # Optional, if using Cloudinary

  # Frontend Static Site
  - type: static
    name: e-portfolio-frontend
    env: static
    rootDir: frontend
    plan: free
    buildCommand: npm install && npm run build
    publishDir: build
    envVars:
      - key: REACT_APP_API_URL
        fromService:
          name: e-portfolio-backend
          type: web
          property: host
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
