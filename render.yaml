services:
  # Backend Web Service
  - type: web
    name: e-portfolio-backend
    env: node
    rootDir: backend
    plan: free
    buildCommand: npm install
    startCommand: npm start
    healthCheckPath: /health
    envVars:
      - key: NODE_VERSION
        value: 18.0.0
      - key: NODE_ENV
        value: production
      - key: MONGODB_URI
        sync: false
      - key: JWT_SECRET
        generateValue: true
      - key: CLIENT_URL
        value: "*" # Allow all for now, can be restricted later
      - key: ALLOW_MEMORY_FALLBACK
        value: "false"

  # Frontend Static Site
  - type: static
    name: e-portfolio-frontend
    env: static
    rootDir: frontend
    plan: free
    buildCommand: npm install && npm run build
    publishDir: build
    envVars:
      - key: REACT_APP_API_URL
        fromService:
          name: e-portfolio-backend
          type: web
          property: host
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
