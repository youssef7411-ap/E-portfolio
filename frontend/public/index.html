<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="theme-color" content="#0a0d12" />
    <meta
      name="description"
      content="Youssef's academic portfolio - Grade 9 student showcasing projects, assignments, and work across all subjects."
    />

    <!-- Open Graph / Social -->
    <meta property="og:type" content="website" />
    <meta property="og:title" content="Youssef's E-Portfolio" />
    <meta
      property="og:description"
      content="Grade 9 academic portfolio showcasing projects and assignments."
    />
    <meta property="og:site_name" content="Youssef's E-Portfolio" />

    <!-- Twitter -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="Youssef's E-Portfolio" />
    <meta
      name="twitter:description"
      content="Grade 9 academic portfolio showcasing projects and assignments."
    />

    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <!-- Preload the exact fonts used by index.css -->
    <link
      rel="preload"
      as="style"
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Roboto:wght@400;500;700&family=JetBrains+Mono:wght@400;500&display=swap"
    />
    <link
      rel="stylesheet"
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Roboto:wght@400;500;700&family=JetBrains+Mono:wght@400;500&display=swap"
    />
    <title>Youssef's E-Portfolio</title>
    <!-- BUILD_VER: 2026-04-21-T-AESTHETIC-V2 -->
    <style>
      /* Fail-safe background to ensure terminal aesthetic even if CSS/JS fails */
      html, body {
        background-color: #000000 !important;
        margin: 0;
        padding: 0;
        width: 100%;
        height: 100%;
        overflow-x: hidden;
        color: #FFFFFF;
        font-family: 'Inter', sans-serif;
      }
      #root {
        background-color: #000000;
        min-height: 100vh;
      }
      /* Pre-React Loading State */
      .pre-loader {
        position: fixed;
        inset: 0;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        background: #000000;
        z-index: 10000;
        transition: opacity 0.5s ease-out;
      }
      .loader-icon {
        width: 40px;
        height: 40px;
        border: 2px solid #FFFFFF;
        animation: pulse 1.5s infinite ease-in-out;
        margin-bottom: 32px;
      }
      .loader-bar {
        width: 200px;
        height: 2px;
        background: #1A1A1A;
        position: relative;
        overflow: hidden;
      }
      .loader-progress {
        position: absolute;
        left: 0;
        top: 0;
        height: 100%;
        background: #FFFFFF;
        width: 30%;
        animation: loading 2s infinite ease-in-out;
      }
      @keyframes pulse {
        0% { transform: scale(1); opacity: 1; }
        50% { transform: scale(1.1); opacity: 0.7; }
        100% { transform: scale(1); opacity: 1; }
      }
      @keyframes loading {
        0% { left: -30%; width: 30%; }
        50% { left: 20%; width: 60%; }
        100% { left: 100%; width: 30%; }
      }
    </style>
  </head>
  <body>
    <noscript>You need to enable JavaScript to run this app.</noscript>
    <div id="root">
      <div class="pre-loader" id="pre-loader">
        <div class="loader-icon"></div>
        <div class="loader-bar">
          <div class="loader-progress"></div>
        </div>
        <p style="margin-top: 16px; font-size: 10px; letter-spacing: 0.1em; text-transform: uppercase; opacity: 0.6;">System Booting...</p>
      </div>
    </div>
  </body>
</html>
